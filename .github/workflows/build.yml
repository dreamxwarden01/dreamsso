name: build images

# Build the SSO and account-portal (BFF) images and push them to GHCR on every push
# to main. amd64 only (prod is x86 — the ubuntu runner builds it natively). There is
# NO auto-deploy wired to this repo; the server pulls these images deliberately.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'admin-ui/**'
      - 'account/**'
      - 'db/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.github/workflows/build.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: sso
            image: ghcr.io/dreamxwarden01/dreamsso-sso
            context: .
            dockerfile: Dockerfile
          - name: account
            image: ghcr.io/dreamxwarden01/dreamsso-account
            context: account
            dockerfile: account/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
